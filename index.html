<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Acquisition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #000;
  color: white;
  scroll-behavior: smooth;
}

.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.08), transparent),
    radial-gradient(circle at 70% 70%, rgba(255,255,255,0.05), transparent),
    #000;
}

h1 {
  font-size: 72px;
  margin: 0;
}

p {
  color: #888;
  margin: 20px 0 40px;
}

.buttons {
  display: flex;
  gap: 15px;
}

a {
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
}

.primary {
  background: white;
  color: black;
}

.secondary {
  border: 1px solid #444;
  color: white;
}

.section {
  padding: 100px 20px;
  text-align: center;
}

.form-container {
  max-width: 400px;
  margin: 0 auto;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Acquisition</h1>
  <p>We build performance-driven growth systems.</p>

  <div class="buttons">
    <a href="#contact" class="primary">Book a Call</a>
    <a href="#services" class="secondary">Explore</a>
  </div>
</div>

<div id="services" class="section">
  <h2>What We Do</h2>
  <p>Paid Ads • Creative • Analytics</p>
</div>

<div id="contact" class="section">
  <h2>Book a Call</h2>

  <div class="form-container">
    <form action="https://formspree.io/f/mjgjeayq" method="POST">
      <input type="text" name="name" placeholder="Your Name" required />
      <input type="email" name="email" placeholder="Your Email" required />
      <textarea name="message" placeholder="Tell us about your business"></textarea>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

</body>
</html>
