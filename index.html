<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Acquisition</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #111, #000);
  color: white;
  font-family: -apple-system, sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  text-align: center;
}

h1 {
  font-size: 64px;
  margin: 0;
  background: linear-gradient(90deg, #fff, #aaa);
  -webkit-background-clip: text;
  color: transparent;
}

p {
  color: #888;
  margin: 20px 0 40px;
}

.buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
}

a {
  padding: 14px 28px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.2s ease;
}

.primary {
  background: white;
  color: black;
}

.primary:hover {
  transform: translateY(-2px);
}

.secondary {
  border: 1px solid #444;
  color: white;
}

.secondary:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>
  <div class="container">
    <h1>Acquisition</h1>
    <p>We build performance-driven growth systems.</p>

    <div class="buttons">
      <a href="#" class="primary">Book a Call</a>
      <a href="#" class="secondary">Explore</a>
    </div>
  </div>
</body>
</html>
