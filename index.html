<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Acquisition</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
  }

  h1 {
    font-size: 48px;
    margin-bottom: 10px;
  }

  p {
    color: #aaa;
  }

  .buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
  }

  .primary {
    background: white;
    color: black;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
  }

  .secondary {
    border: 1px solid #444;
    padding: 10px 20px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
  }

  /* FORM */
  #contact {
    text-align: center;
    margin-top: 150px;
  }

  input, textarea {
    width: 300px;
    padding: 10px;
    margin-top: 10px;
    background: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 6px;
  }

  button {
    margin-top: 15px;
    padding: 10px 20px;
    background: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  /* OVERLAY MINI PITCH */
  #mini-pitch {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .pitch-content {
    text-align: center;
    max-width: 500px;
    animation: fadeIn 0.4s ease;
  }

  .pitch-steps div {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>
</head>

<body>

<!-- HERO -->
<div class="container">
  <h1>Acquisition</h1>
  <p>We build performance-driven growth systems.</p>

  <div class="buttons">
    <a href="#contact" class="primary">Book a Call</a>
    <a href="#" class="secondary" onclick="showPitch(event)">Explore</a>
  </div>
</div>

<!-- FORM -->
<div id="contact">
  <h2>Book a Call</h2>

  <form action="https://formspree.io/f/mjgjeayq" method="POST">
    
    <input type="hidden" name="_cc" value="youremail@gmail.com">

    <br>
    <input type="text" name="name" placeholder="Your Name" required>
    <br>
    <input type="email" name="email" placeholder="Your Email" required>
    <br>
    <textarea name="message" placeholder="Tell us about your business"></textarea>
    <br>

    <button type="submit">Submit</button>
  </form>
</div>

<!-- MINI PITCH OVERLAY -->
<div id="mini-pitch">
  <div class="pitch-content">

    <h2>How we scale brands predictably</h2>
    <p>We build systems that turn attention into revenue.</p>

    <div class="pitch-steps">
      <div>01. Identify winning channels</div>
      <div>02. Build high-converting creatives</div>
      <div>03. Scale with data</div>
    </div>

    <button onclick="closePitch()">Close</button>

  </div>
</div>

<!-- SCRIPT -->
<script>
  function showPitch(event) {
    event.preventDefault();
    document.getElementById("mini-pitch").style.display = "flex";
  }

  function closePitch() {
    document.getElementById("mini-pitch").style.display = "none";
  }
</script>

</body>
</html>
