<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Acquisition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #000;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    a {
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .primary {
      background: white;
      color: black;
    }

    .primary:hover {
      opacity: 0.8;
    }

    .secondary {
      border: 1px solid white;
      color: white;
    }

    .secondary:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Acquisition</h1>
    <p>Performance-driven growth systems.</p>

    <div class="buttons">
      <a href="#" class="primary">Book a Call</a>
      <a href="#" class="secondary">Explore</a>
    </div>
  </div>
</body>
</html>
